<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login & Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            width:350px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#4facfe;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2196f3;
        }

        .toggle-text{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .toggle-text span{
            color:#2196f3;
            cursor:pointer;
            font-weight:bold;
        }

        .hidden{
            display:none;
        }

        .message{
            text-align:center;
            margin-top:10px;
            color:green;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h2>Login</h2>

            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Enter Email">
            </div>

            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Enter Password">
            </div>

            <button onclick="login()">Login</button>

            <p class="toggle-text">
                Don't have an account?
                <span onclick="showRegister()">Register</span>
            </p>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="hidden">
            <h2>Register</h2>

            <div class="input-group">
                <input type="text" id="registerName" placeholder="Enter Name">
            </div>

            <div class="input-group">
                <input type="email" id="registerEmail" placeholder="Enter Email">
            </div>

            <div class="input-group">
                <input type="password" id="registerPassword" placeholder="Enter Password">
            </div>

            <button onclick="register()">Register</button>

            <p class="toggle-text">
                Already have an account?
                <span onclick="showLogin()">Login</span>
            </p>
        </div>

        <p class="message" id="message"></p>

    </div>

    <script>
        function showRegister(){
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("registerForm").classList.remove("hidden");
            document.getElementById("message").innerText = "";
        }

        function showLogin(){
            document.getElementById("registerForm").classList.add("hidden");
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("message").innerText = "";
        }

        // REGISTER FUNCTION
        function register(){

            let name = document.getElementById("registerName").value;
            let email = document.getElementById("registerEmail").value;
            let password = document.getElementById("registerPassword").value;

            if(name === "" || email === "" || password === ""){
                alert("Please fill all fields");
                return;
            }

            // Save user data in browser localStorage
            localStorage.setItem("email", email);
            localStorage.setItem("password", password);

            document.getElementById("message").innerText =
                "Registration Successful!";

            showLogin();
        }

        // LOGIN FUNCTION
        function login(){

            let email = document.getElementById("loginEmail").value;
            let password = document.getElementById("loginPassword").value;

            let storedEmail = localStorage.getItem("email");
            let storedPassword = localStorage.getItem("password");

            if(email === storedEmail && password === storedPassword){
                document.getElementById("message").innerText =
                    "Login Successful!";
            }
            else{
                alert("Invalid Email or Password");
            }
        }
    </script>

</body>
</html>
